{% extends 'base.html' %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-decoration-none">Главная</a></li>
        <li class="breadcrumb-item active" aria-current="page">Пост</li>
    </ol>
</nav>

<article class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title mb-3">{{ post.title }}</h1>

        {% if post.author %}
        <p class="text-muted">Автор: <strong>{{ post.author.name }}</strong></p>
        {% endif %}

        <p class="text-muted mb-4">
            <small>Опубликовано: {{ post.published_at }}</small>
        </p>

        <hr>

        <div class="card-text fs-5" style="line-height: 1.7;">
            {{ post.content|linebreaks }}
        </div>
    </div>

    <div class="card-footer bg-white border-top-0">
        <a href="{% url 'post_list' %}" class="btn btn-outline-secondary">
            ← Назад к списку
        </a>
    </div>
</article>
{% endblock %}
