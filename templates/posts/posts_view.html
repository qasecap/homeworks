{% extends 'base.html' %}

{% block content %}
<h1>POSTS</h1>
{% for post in posts %}
<div style="display: flex; gap: 10px; margin-bottom: 10px;">
    <p>{{ post.id }}</p>
    <h3>{{ post.title }}</h3>
</div>
<p>{{ post.content }}</p>
<p><small>Опубликовано: {{ post.published_at }}</small></p>
<hr>
{% endfor %}
{% endblock %}
