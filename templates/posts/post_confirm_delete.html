{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
                <h2 class="card-title text-danger mb-3">Удалить пост?</h2>
                <p class="card-text mb-4">
                    Вы уверены, что хотите удалить пост <strong>«{{ post.title }}»</strong>?
                    Это действие необратимо.
                </p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Удалить</button>
                    <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
